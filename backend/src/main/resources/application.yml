server:
  port: 8082

spring:
  application:
    name: readypath-api
  profiles:
    active: default

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

endpoint:
  health:
    show-details: always

info:
  application:
    name: ReadyPath AI API
    version: 0.1.0
    description: ReadyPath AI hackathon backend

gemini:
  model: gemini-3.5-flash
  api-key: ${GOOGLE_API_KEY:}