<aside class="sidebar">
  <div class="brand">
    <div class="brand-mark">10</div>
    <div>
      <div class="brand-title">Onboard10 <span>AI</span></div>
      <div class="brand-subtitle">10 gates to readiness</div>
    </div>
  </div>

  <nav>
    @for (item of navItems; track item.route) {
      <a [routerLink]="item.route" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">{{ item.icon }}</span>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="responsible-ai">
    <div class="mini-title">Responsible AI</div>
    <div class="mini-text">Human-approved, policy-backed and audit-ready.</div>
  </div>
</aside>
