<h1 class="page-title">Reports & Audit Evidence</h1>
<p class="page-subtitle">Evidence trail generated as a byproduct of onboarding.</p>

<section class="card card-pad">
  <h3>Agent Activity Log</h3>
  @for (activity of state().agentActivity; track activity.id) {
    <div class="activity-row">
      <span>{{ activity.type }}</span>
      <div>
        <strong>{{ activity.title }}</strong>
        <p>{{ activity.description }}</p>
        <small>{{ activity.timestamp }} · {{ activity.actor }}</small>
      </div>
    </div>
  }
</section>
