<div class="application-shell">
  <aside class="side-navigation">
    <a
      class="brand"
      [routerLink]="homeRoute()">
      <img
        src="/db-itc-10-years-mark.svg"
        alt="10 Years Deutsche Bank India Technology Center" />

      <div>
        <strong>ReadyPath AI</strong>

        <span>
          Onboarding Intelligence
        </span>
      </div>
    </a>

    <div class="workspace-label">
      {{ currentPersona() }} WORKSPACE
    </div>

    <nav aria-label="Primary navigation">
      @for (
        item of navigationItems();
        track item.route
      ) {
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          class="navigation-item">
          <span class="navigation-icon">
            {{ item.shortLabel }}
          </span>

          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <footer class="anniversary-footer">
      <img
        src="/db-itc-10-years-mark.svg"
        alt=""
        aria-hidden="true" />

      <span>
        Deutsche Bank India
        Technology Center
      </span>
    </footer>
  </aside>

  <section class="workspace">
    <header class="top-bar">
      <div class="logged-in-user">
        <div class="avatar">
          {{ currentUser().initials }}
        </div>

        <div class="user-copy">
          <strong>
            {{ currentUser().displayName }}
          </strong>

          <span>
            {{ currentUser().roleName }}
          </span>
        </div>

        <button
          type="button"
          class="logout-button"
          (click)="logout()">
          Logout
        </button>
      </div>
    </header>

    <main class="page-outlet">
      <router-outlet />
    </main>
  </section>
</div>
