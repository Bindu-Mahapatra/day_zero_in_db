name: Build Docker Images

on:

  push:
    branches:
      - main

  pull_request:

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build Backend Image
        run: |
          docker build -t dayzero-backend:v1 ./backend

      - name: Build Frontend Image
        run: |
          docker build -t dayzero-frontend:v1 ./frontend