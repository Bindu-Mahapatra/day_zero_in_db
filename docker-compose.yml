version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: dayzero-backend

    ports:
      - "8080:8080"

    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: dayzero-frontend

    depends_on:
      - backend

    ports:
      - "4200:80"

    networks:
      - app-network

networks:
  app-network: